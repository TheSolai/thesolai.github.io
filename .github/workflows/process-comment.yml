name: Process Comment

# GitHub Actions Workflow: Process Comment
# Triggered by:
#   - repository_dispatch from Google Apps Script (real comment submissions)
#   - workflow_dispatch for manual testing
#
# To test manually via CLI:
#   gh workflow run process-comment --repo=TheSolAI/thesolai.github.io \
#     -f slug="test" -f name="Sol" -f message="Test"

on:
  repository_dispatch:
    types: [new_comment]
  workflow_dispatch:
    inputs:
      slug:
        description: "Page slug"
        required: true
        default: "test"
      name:
        description: "Commenter name"
        required: true
        default: "Test"
      message:
        description: "Comment message"
        required: true
        default: "Test comment"
      pin:
        description: "PIN code"
        required: false
        default: ""
      email:
        description: "Email address"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  save-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build comment JSON
        id: build
        env:
          SLUG: ${{ github.event.client_payload.slug || github.event.inputs.slug }}
          NAME: ${{ github.event.client_payload.name || github.event.inputs.name }}
          MESSAGE: ${{ github.event.client_payload.message || github.event.inputs.message }}
          IS_AMRE: ${{ toJson(github.event.client_payload.isAmre) || 'false' }}
          AVATAR: ${{ github.event.client_payload.avatar || '' }}
          EMAIL: ${{ github.event.client_payload.email || github.event.inputs.email || '' }}
          TS: ${{ github.event.client_payload.timestamp || github.event.inputs.run_id || github.run_id }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, datetime

          slug = os.environ.get("SLUG", "").strip()
          name = os.environ.get("NAME", "").strip()
          message = os.environ.get("MESSAGE", "").strip()
          is_amre_raw = os.environ.get("IS_AMRE", "false")
          # Handle JSON bool from client_payload vs string from inputs
          is_amre = is_amre_raw.lower() in ("true", "true") if is_amre_raw else False
          avatar = os.environ.get("AVATAR", "")
          email = os.environ.get("EMAIL", "") or None
          ts = os.environ.get("TS", "")

          safe_slug = re.sub(r'[^a-zA-Z0-9\-]', '-', slug).strip('-')[:50]
          filename = f"_data/comments/{safe_slug}-{ts}.json"

          comment = {
              "id": str(ts),
              "slug": slug,
              "name": name,
              "message": message,
              "email": email,
              "isAmre": is_amre,
              "avatar": avatar,
              "date": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          }

          os.makedirs("_data/comments", exist_ok=True)
          with open(filename, "w") as f:
              json.dump(comment, f, indent=2)

          # Write GitHub Actions output
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"filename={filename}\n")
              f.write(f"slug={slug}\n")
              f.write(f"safe_slug={safe_slug}\n")

          print(f"Saved: {filename}")
          print(f"Name: {name}, isAmre: {is_amre}")
          PYEOF

      - name: Rebuild comments index
        run: |
          python3 << 'PYEOF'
          import json, glob

          files = sorted(glob.glob("_data/comments/*.json"))
          comments = []
          for f in files:
              try:
                  with open(f) as fp:
                      comments.append(json.load(fp))
              except:
                  pass

          comments.sort(key=lambda x: x.get("date", ""), reverse=True)
          with open("_data/comments-index.json", "w") as f:
              json.dump(comments, f, indent=2)
          print(f"Index: {len(comments)} comments")
          PYEOF

      - name: Push to comment branch
        env:
          FILENAME: ${{ steps.build.outputs.filename }}
          SAFE_SLUG: ${{ steps.build.outputs.safe_slug }}
          NAME: ${{ github.event.client_payload.name || github.event.inputs.name }}
        run: |
          BRANCH="comments/${SAFE_SLUG}"
          git config user.name "solai-comments[bot]"
          git config user.email "bot@github.com"
          git checkout -b "${BRANCH}" 2>/dev/null || git checkout "${BRANCH}"
          git add _data/comments/ _data/comments-index.json
          git commit -m "Comment from ${NAME}"
          git push -u origin "${BRANCH}" --force

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAFE_SLUG: ${{ steps.build.outputs.safe_slug }}
          NAME: ${{ github.event.client_payload.name || github.event.inputs.name }}
        run: |
          BRANCH="comments/${SAFE_SLUG}"

          PR=$(gh pr list --base main --head "${BRANCH}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR" ] && [ "$PR" != "null" ] && [ "$PR" != "" ]; then
            echo "PR #$PR exists — updating..."
            git fetch origin "${BRANCH}" 2>/dev/null || true
            git checkout "${BRANCH}"
            git pull origin "${BRANCH}" --ff-only 2>/dev/null || true
            git add _data/comments/ _data/comments-index.json
            git commit --amend --no-edit 2>/dev/null || true
            git push -f
          else
            gh pr create --base main --head "${BRANCH}" \
              --title "Comment: ${SAFE_SLUG}" \
              --body "Comment from **${NAME}** on \`${SAFE_SLUG}\`.\n\nAuto-generated by Sol AI comment system."
          fi

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAFE_SLUG: ${{ steps.build.outputs.safe_slug }}
        run: |
          BRANCH="comments/${SAFE_SLUG}"
          PR=$(gh pr list --base main --head "${BRANCH}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR" ] && [ "$PR" != "null" ] && [ "$PR" != "" ]; then
            gh pr merge --admin --auto "${PR}"
          fi
