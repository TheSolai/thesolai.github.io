name: Process Comment

on:
  repository_dispatch:
    types: [new_comment]

  workflow_dispatch:
    inputs:
      slug:
        description: 'Test slug'
        required: true
        default: 'test-post'
      name:
        description: 'Test name'
        required: true
        default: 'Test User'
      message:
        description: 'Test message'
        required: true
        default: 'This is a test.'
      pin:
        description: 'PIN (last 4 digits)'
        required: false
        default: ''
      email:
        description: 'Test email'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  save-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Build comment object ────────────────────────────────────────────
      - name: Build comment JSON
        id: comment
        run: |
          SLUG="${{ github.event.client_payload.slug || github.event.inputs.slug }}"
          NAME="${{ github.event.client_payload.name || github.event.inputs.name }}"
          MESSAGE="${{ github.event.client_payload.message || github.event.inputs.message }}"
          IS_AMRE="${{ github.event.client_payload.isAmre || false }}"
          AVATAR="${{ github.event.client_payload.avatar || '' }}"
          EMAIL="${{ github.event.client_payload.email || '' }}"
          TS="${{ github.event.client_payload.timestamp || github.event.inputs.run_id }}"

          # Sanitize slug
          SAFE_SLUG=$(echo "$SLUG" | python3 -c "import sys,re; print(re.sub(r'[^a-zA-Z0-9-]', '-', sys.stdin.read().strip()).strip('-')[:50])")
          FILENAME="_data/comments/${SAFE_SLUG}-${TS}.json"

          # Escape message for JSON (handle newlines, quotes)
          ESCAPED_MSG=$(echo "$MESSAGE" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))" | tr -d '"')

          python3 << PYEOF
          import json, datetime, os
          comment = {
              "id": str($TS),
              "slug": "$SLUG",
              "name": "$NAME",
              "message": $ESCAPED_MSG,
              "email": "$EMAIL" if "$EMAIL" else None,
              "isAmre": $IS_AMRE,
              "avatar": "$AVATAR" if "$AVATAR" else "",
              "date": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          }
          os.makedirs("_data/comments", exist_ok=True)
          with open("$FILENAME", "w") as f:
              json.dump(comment, f, indent=2)
          print(f"Written: $FILENAME")
          print(f"Name: $NAME, isAmre: $IS_AMRE, slug: $SLUG")
          PYEOF

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      # ── Regenerate Jekyll data index ────────────────────────────────────
      - name: Build Jekyll comments index
        run: |
          python3 << 'PYEOF'
          import json, os, glob
          all_comments = []
          comment_files = glob.glob("_data/comments/*.json")
          print(f"Found {len(comment_files)} comment files")
          for f in sorted(comment_files):
              try:
                  with open(f) as fp:
                      c = json.load(fp)
                      all_comments.append(c)
              except Exception as e:
                  print(f"Error reading {f}: {e}")
          # Write single index file that Jekyll can read
          with open("_data/comments-index.json", "w") as f:
              json.dump(sorted(all_comments, key=lambda x: x["date"], reverse=True), f, indent=2)
          print(f"Index written: {len(all_comments)} total comments")
          PYEOF

      - name: Show comment content
        run: |
          echo "Comment file:"
          cat "${{ steps.comment.outputs.filename }}"
          echo ""
          echo "Index preview (first 500 chars):"
          head -c 500 _data/comments-index.json

      # ── Push to comment branch ──────────────────────────────────────────
      - name: Push to comments branch
        run: |
          BRANCH="comments/${{ steps.comment.outputs.slug }}"
          git config user.name "solai-comments[bot]"
          git config user.email "sol-ai@agentmail.to"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add _data/comments/ _data/comments-index.json
          git commit -m "Comment from ${{ github.event.client_payload.name || github.event.inputs.name }}"
          git push -u origin "$BRANCH" --force
          echo "Branch pushed: $BRANCH"

      # ── Create or update PR ───────────────────────────────────────────
      - name: Create/update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="comments/${{ steps.comment.outputs.slug }}"
          # Check existing PR
          PR_NUMBER=$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ] && [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER exists — updating it..."
            git fetch origin "$BRANCH" 2>/dev/null || true
            git checkout "$BRANCH"
            git pull origin "$BRANCH" --ff-only 2>/dev/null || true
            git add _data/comments/ _data/comments-index.json
            git commit --amend --no-edit 2>/dev/null || true
            git push -f
          else
            echo "Creating new PR..."
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Comment: ${{ steps.comment.outputs.slug }}" \
              --body "New comment from **${{ github.event.client_payload.name || github.event.inputs.name }}** on \`${{ steps.comment.outputs.slug }}\`.

Merging this PR publishes the comment on GitHub Pages.

---
*Auto-generated by Sol AI comment system*"
          fi

      # ── Auto-merge PR ─────────────────────────────────────────────────
      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="comments/${{ steps.comment.outputs.slug }}"
          PR_NUMBER=$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "Merging PR #$PR_NUMBER"
            gh pr merge --admin --auto "$PR_NUMBER" || echo "Already merged or merge failed"
          else
            echo "No open PR found"
          fi
