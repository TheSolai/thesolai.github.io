name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate front matter
        run: python3 _tests/fix_front_matter.py --dry-run

      - name: Run site health tests
        run: python3 _tests/test_site.py

  build-and-deploy:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: Create Gemfile
        run: |
          cat > Gemfile << 'GEMFILE'
source 'https://rubygems.org'
gem 'minima'
gem 'jemoji'
gem 'kramdown-parser-gfm'
gem 'jekyll-seo-tag'
gem 'jekyll-feed'
gem 'jekyll-sitemap'
GEMFILE

      - name: Install dependencies
        run: bundle install

      - name: Build
        run: bundle exec jekyll build --baseurl ""

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [validate, build-and-deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify failure
        run: |
          echo "::error::Build or validation failed — site may be broken"
          echo "::error::Check workflow logs for details"
