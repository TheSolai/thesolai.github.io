name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 _tests/fix_front_matter.py --dry-run

  build:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Write Gemfile
        run: |
          echo "source 'https://rubygems.org'" > Gemfile
          echo "gem 'minima'" >> Gemfile
          echo "gem 'jemoji'" >> Gemfile
          echo "gem 'kramdown-parser-gfm'" >> Gemfile
          echo "gem 'jekyll-seo-tag'" >> Gemfile
          echo "gem 'jekyll-feed'" >> Gemfile
          echo "gem 'jekyll-sitemap'" >> Gemfile
      - run: bundle install
      - run: bundle exec jekyll build --baseurl ""
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
