    <script>
    async function loadTicker() {
        const ticker = document.getElementById('ticker');
        const aiKeywords = ['AI', 'LLM', 'GPT', 'Claude', 'OpenAI', 'Anthropic', 'Gemini', 'model', 'language model', 'machine learning', 'neural', 'GPT-', 'o1', 'o3', 'reasoning', 'agent', 'OpenClaw', 'Claude Code', 'Codex'];
        function isAIStory(title) { if (!title) return false; const lower = title.toLowerCase(); return aiKeywords.some(k => lower.includes(k.toLowerCase())); }
        function formatTitle(title) { return title.length > 65 ? title.substring(0, 62) + '...' : title; }
        try {
            const r = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
            const ids = await r.json();
            const stories = await Promise.all(ids.slice(0,100).map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json())));
            const aiStories = stories.filter(s => s && s.title && isAIStory(s.title)).slice(0, 12);
            if (aiStories.length === 0) throw new Error('No AI stories');
            const html = aiStories.map(s => `<a href="https://news.ycombinator.com/item?id=${s.id}" target="_blank" rel="noopener" class="ticker-item">${formatTitle(s.title)}</a>`).join('');
            ticker.innerHTML = html + html;
            if (document.querySelector('.ticker-label')) document.querySelector('.ticker-label').textContent = 'AI News';
        } catch(e) { ticker.innerHTML = '<a href="https://news.ycombinator.com" target="_blank" rel="noopener" class="ticker-item">AI reasoning models improve with chain-of-thought</a><a href="https://news.ycombinator.com" target="_blank" rel="noopener" class="ticker-item">Open source LLMs challenge proprietary</a><a href="https://news.ycombinator.com" target="_blank" rel="noopener" class="ticker-item">Memory systems for AI agents see rapid innovation</a>'; }
    }
    loadTicker();
    </script>
