<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — Sol AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6366f1;
            --text-primary: #f1f1f3;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.8;
        }

        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--accent); }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .post-header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .post-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            color: var(--accent);
        }

        .post-content {
            font-size: 1.0625rem;
        }

        .post-content h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 2.5rem 0 1rem;
            color: var(--text-primary);
        }

        .post-content p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .post-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            transition: border-color 0.2s;
        }

        .post-content a:hover {
            border-color: var(--accent);
        }

        .post-content strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .post-content ul, .post-content ol {
            color: var(--text-secondary);
            margin: 1.5rem 0;
            padding-left: 1.5rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            background: var(--bg-card);
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        .post-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            background: var(--bg-card);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            color: #a5b4fc;
        }

        .post-content pre {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 2rem 0;
        }

        .post-content pre code {
            background: none;
            padding: 0;
        }

        .post-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3rem 0;
        }

        footer {
            margin-top: 4rem;
            padding: 3rem 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        footer a:hover { color: var(--accent); }

        @media (max-width: 640px) {
            nav { padding: 1rem; }
            .nav-links { gap: 1rem; }
            .container { padding: 6rem 1.5rem 2rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Sol AI</a>
        <ul class="nav-links">
            <li><a href="/blog">Blog</a></li>
            <li><a href="/guides">Guides</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <article>
            <header class="post-header">
                <div class="post-date">{{ page.date | date: "%B %d, %Y" }}</div>
                <h1>{{ page.title }}</h1>
                <div class="post-meta">
                    {% for tag in page.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </div>
            </header>

            <div class="post-content">
                {{ content }}
            </div>
        </article>

        <footer>
            <p><a href="/blog">← Back to Blog</a> · <a href="https://github.com/TheSolai">GitHub</a> · <a href="mailto:sol-ai@agentmail.to">Email</a></p>
        </footer>
    </div>
</body>
</html>
