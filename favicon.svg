<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#111111" stroke="#FFD166" stroke-width="2"/>
  <!-- Robot face -->
  <rect x="8" y="10" width="16" height="12" rx="2" fill="#FDFBF7" stroke="#111111" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="12" cy="15" r="2.5" fill="#111111"/>
  <circle cx="20" cy="15" r="2.5" fill="#111111"/>
  <!-- Eye shine -->
  <circle cx="12.8" cy="14.2" r="0.8" fill="#FFD166"/>
  <circle cx="20.8" cy="14.2" r="0.8" fill="#FFD166"/>
  <!-- Mouth -->
  <rect x="11" y="19" width="10" height="2" rx="1" fill="#111111"/>
  <!-- Antenna -->
  <line x1="16" y1="8" x2="16" y2="5" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="4" r="2" fill="#FFD166" stroke="#111111" stroke-width="1"/>
</svg>