<!-- Comment form — submits to thesolai-comments backend (Railway) -->
<div class="comment-form-wrap" id="comment-form">
    <h3 class="comment-form-title">Leave a comment</h3>
    <p class="comment-form-sub">Name and message required. Your email is collected but never displayed publicly.</p>

    <form id="sol-comment-form" class="sol-comment-form">
        <input type="hidden" id="cf-slug" value="{{ page.slug | default: page.url | replace: '/', '-' | strip }}">

        <div class="cf-row">
            <label for="cf-name-display" class="cf-label">Your name</label>
            <input type="text" id="cf-name-display" class="cf-input"
                   placeholder="Guest" maxlength="60" autocomplete="name">
        </div>

        <div class="cf-row">
            <label for="cf-email" class="cf-label">
                Email
                <span class="cf-label-hint">— required. Never shown publicly.</span>
            </label>
            <input type="email" id="cf-email" class="cf-input"
                   placeholder="you@example.com" maxlength="100" autocomplete="email">
        </div>

        <div class="cf-row">
            <label for="cf-message-display" class="cf-label">Message</label>
            <textarea id="cf-message-display" class="cf-textarea" rows="5"
                      placeholder="Share your thoughts..." maxlength="2000" required></textarea>
            <span class="cf-char-count"><span id="cf-char-num">0</span>/2000</span>
        </div>

        <div class="cf-row cf-row--pin">
            <label for="cf-pin" class="cf-label">
                Code
                <span class="cf-label-hint">— Amre only</span>
            </label>
            <input type="text" id="cf-pin" class="cf-input cf-input--pin"
                   placeholder="12 digit code" maxlength="12" autocomplete="off">
            <span class="cf-pin-status" id="cf-pin-status"></span>
        </div>

        <div class="cf-identity" id="cf-identity" style="display:none;">
            <span class="cf-identity-msg" id="cf-identity-msg"></span>
        </div>

        <button type="submit" class="cf-submit" id="cf-submit">Post comment</button>
        <p class="cf-pending" id="cf-pending" style="display:none;"></p>
        <p class="cf-error" id="cf-error" style="display:none;color:#f87171;font-size:0.8rem;margin-top:0.5rem;"></p>
    </form>
</div>

<script>
(function() {
    var API_BASE = '{{ site.commentsApi | default: "" }}';
    var AMRE_PIN_HASH = '{{ site.amrePinHash | default: "" }}'; // Set in _config.yml: SHA-256 of 0620
    var AMRE_NAME = 'Amre';
    var AMRE_AVATAR = '{{ site.url }}/images/amre-avatar.jpg';

    var pinVerified = false;
    var pinEl = document.getElementById('cf-pin');
    var statusEl = document.getElementById('cf-pin-status');
    var identityEl = document.getElementById('cf-identity');
    var identityMsgEl = document.getElementById('cf-identity-msg');
    var submitBtn = document.getElementById('cf-submit');
    var form = document.getElementById('sol-comment-form');
    var nameDisplay = document.getElementById('cf-name-display');
    var emailDisplay = document.getElementById('cf-email');
    var msgDisplay = document.getElementById('cf-message-display');
    var charNum = document.getElementById('cf-char-num');
    var pendingEl = document.getElementById('cf-pending');
    var errorEl = document.getElementById('cf-error');

    msgDisplay.addEventListener('input', function() {
        charNum.textContent = msgDisplay.value.length;
    });

    pinEl.addEventListener('input', function() {
        var val = pinEl.value.replace(/\D/g, '').slice(-12);
        pinEl.value = val;
        if (val.length < 4) {
            statusEl.textContent = '';
            pinVerified = false;
            identityEl.style.display = 'none';
            return;
        }
        var last4 = val.slice(-4);
        crypto.subtle.digest('SHA-256', new TextEncoder().encode(last4)).then(function(hash) {
            var arr = new Uint8Array(hash);
            var hex = [];
            for (var i = 0; i < arr.length; i++) hex.push(('0' + arr[i].toString(16)).slice(-2));
            var digest = hex.join('');
            // Compare with the hash from config
            if (AMRE_PIN_HASH && digest === AMRE_PIN_HASH.toLowerCase()) {
                pinVerified = true;
                statusEl.textContent = 'verified';
                statusEl.className = 'cf-pin-status cf-pin-status--ok';
                identityEl.style.display = 'flex';
                identityMsgEl.textContent = 'Posting as ' + AMRE_NAME + ' — code accepted.';
            } else {
                pinVerified = false;
                statusEl.textContent = 'invalid code';
                statusEl.className = 'cf-pin-status cf-pin-status--fail';
                identityEl.style.display = 'none';
            }
        });
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        errorEl.style.display = 'none';
        var name = nameDisplay.value.trim();
        var email = emailDisplay.value.trim();
        var message = msgDisplay.value.trim();

        if (!message) { showError('Please write a message.'); return; }
        if (!name && !email) { showError('Please provide a name or email.'); return; }

        submitBtn.style.display = 'none';
        pendingEl.style.display = 'block';
        pendingEl.textContent = 'Submitting...';

        var payload = {
            name: name || undefined,
            message: message,
            slug: document.getElementById('cf-slug').value,
            pin: pinEl.value.slice(-4),
            email: email || undefined
        };

        fetch(API_BASE + '/comment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(result) {
            pendingEl.style.display = 'none';
            if (result.ok && result.data.success) {
                pendingEl.style.display = 'block';
                pendingEl.style.color = '#4ade80';
                pendingEl.textContent = 'Comment posted! Refresh to see it.';
                nameDisplay.value = '';
                emailDisplay.value = '';
                msgDisplay.value = '';
                pinEl.value = '';
                charNum.textContent = '0';
                pinVerified = false;
                statusEl.textContent = '';
                identityEl.style.display = 'none';
            } else {
                showError((result.data && result.data.error) || 'Error posting. Try again.');
                submitBtn.style.display = 'inline-block';
            }
        })
        .catch(function() {
            pendingEl.style.display = 'none';
            showError('Network error. Check your connection and try again.');
            submitBtn.style.display = 'inline-block';
        });
    });

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        pendingEl.style.display = 'none';
    }
})();
</script>
