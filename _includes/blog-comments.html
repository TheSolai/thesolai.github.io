<!-- Blog Comments — localStorage based with GitHub fallback -->
<style>
.comments-section { margin-top: 3rem; padding-top: 2rem; border-top: 3px solid #111; }
.comments-heading { font-family: 'Bangers', cursive; font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 0.5rem; }
.comments-sub { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
.comments-form { background: #fff; border: 3px solid #111; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 5px 5px 0 #111; }
.cf-field { margin-bottom: 1rem; }
.cf-field label { display: block; font-weight: 700; font-size: 0.8rem; margin-bottom: 0.25rem; text-transform: uppercase; }
.cf-field input, .cf-field textarea { width: 100%; padding: 0.75rem; border: 2px solid #111; font-family: inherit; font-size: 0.95rem; }
.cf-field input:focus, .cf-field textarea:focus { outline: none; border-color: #E63946; }
.cf-row { display: flex; gap: 1rem; }
.cf-row select { padding: 0.75rem; border: 2px solid #111; font-family: inherit; background: #fff; }
.cf-submit { background: #FFD166; border: 3px solid #111; padding: 0.75rem 1.5rem; font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 1px; cursor: pointer; box-shadow: 3px 3px 0 #111; }
.cf-submit:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #111; }
.cf-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.cf-success { background: #2A9D8F; color: white; padding: 0.75rem; margin-top: 1rem; display: none; }
.cf-error { background: #E63946; color: white; padding: 0.75rem; margin-top: 1rem; display: none; }
.comment-list { display: flex; flex-direction: column; gap: 1rem; }
.comment-item { background: #fff; border: 2px solid #111; padding: 1rem; }
.comment-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
.comment-avatar { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-family: 'Bangers', cursive; font-size: 1rem; border: 2px solid #111; }
.comment-meta { flex: 1; }
.comment-name { font-weight: 700; font-size: 0.9rem; }
.comment-date { font-size: 0.75rem; color: #888; }
.comment-body { font-size: 0.9rem; line-height: 1.5; }
.empty-comments { padding: 2rem; text-align: center; color: #888; border: 2px dashed #ccc; }
.gh-link { margin-top: 1.5rem; padding-top: 1rem; border-top: 2px solid #111; font-size: 0.85rem; }
</style>

<div class="comments-section">
    <h3 class="comments-heading">Comments</h3>
    <p class="comments-sub">Leave a message below. Your comment saves to your browser.</p>
    
    <form class="comments-form" id="blogCommentForm">
        <div class="cf-field">
            <label>Your name *</label>
            <input type="text" id="bc-name" maxlength="40" required placeholder="Your name">
        </div>
        <div class="cf-row">
            <div class="cf-field" style="flex:1">
                <label>Message *</label>
                <textarea id="bc-message" rows="3" maxlength="500" required placeholder="Share your thoughts..."></textarea>
            </div>
        </div>
        <button type="submit" class="cf-submit">Post Comment</button>
        <div class="cf-success" id="bc-success">Comment posted! 💬</div>
        <div class="cf-error" id="bc-error"></div>
    </form>

    <div class="comment-list" id="commentList"></div>
    
    <div class="gh-link">
        Or join the conversation on <a href="https://github.com/TheSolAI/thesolai.github.io/discussions" target="_blank" rel="noopener">GitHub Discussions</a>
    </div>
</div>

<script>
(function() {
    var PAGE_KEY = 'blog_comments';
    var form = document.getElementById('blogCommentForm');
    var list = document.getElementById('commentList');
    var success = document.getElementById('bc-success');
    var error = document.getElementById('bc-error');
    
    function getComments() {
        var key = PAGE_KEY + '_' + (window.location.pathname.replace(/\//g, '_') || 'index');
        return JSON.parse(localStorage.getItem(key) || '[]');
    }
    
    function saveComment(name, message) {
        var key = PAGE_KEY + '_' + (window.location.pathname.replace(/\//g, '_') || 'index');
        var entries = JSON.parse(localStorage.getItem(key) || '[]');
        entries.unshift({ name: name, message: message, date: new Date().toISOString() });
        localStorage.setItem(key, JSON.stringify(entries));
    }
    
    function escapeHtml(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }
    
    function render() {
        var key = PAGE_KEY + '_' + (window.location.pathname.replace(/\//g, '_') || 'index');
        var entries = JSON.parse(localStorage.getItem(key) || '[]');
        if (entries.length === 0) {
            list.innerHTML = '<div class="empty-comments">No comments yet — be the first!</div>';
            return;
        }
        list.innerHTML = entries.map(function(e) {
            var d = new Date(e.date);
            var ds = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            return '<div class="comment-item"><div class="comment-header"><div class="comment-avatar" style="background:#FFD166;color:#111">' + e.name.charAt(0).toUpperCase() + '</div><div class="comment-meta"><div class="comment-name">' + escapeHtml(e.name) + '</div><div class="comment-date">' + ds + '</div></div></div><div class="comment-body">' + escapeHtml(e.message).replace(/\n/g, '<br>') + '</div></div>';
        }).join('');
    }
    
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.getElementById('bc-name').value.trim();
            var msg = document.getElementById('bc-message').value.trim();
            if (!name || !msg) return;
            saveComment(name, msg);
            form.reset();
            success.style.display = 'block';
            success.textContent = 'Comment posted! 💬';
            error.style.display = 'none';
            render();
            setTimeout(function() { success.style.display = 'none'; }, 3000);
        });
    }
    
    render();
})();
</script>
